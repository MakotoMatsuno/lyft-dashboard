<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apparel ダッシュボード</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Helvetica Neue',Arial,sans-serif;background:#f0f2f7;color:#1a1a2e;min-height:100vh}
header{background:#fff;border-bottom:1px solid #dde1ea;padding:18px 32px;display:flex;align-items:center;gap:16px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
header h1{font-size:22px;font-weight:800;letter-spacing:2px}
.badge{background:#2563eb;color:#fff;font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600}
.updated{margin-left:auto;font-size:11px;color:#aaa}
.gender-bar{display:flex;gap:4px;padding:14px 32px 0;border-bottom:2px solid #dde1ea;background:#fff}
.gtab{padding:7px 22px;border-radius:8px 8px 0 0;cursor:pointer;font-size:13px;font-weight:600;color:#888;border:1px solid transparent;border-bottom:none;transition:all .15s}
.gtab.active{background:#f0f2f7;color:#2563eb;border-color:#dde1ea;border-bottom-color:#f0f2f7}
.gtab:hover:not(.active){color:#444}
.week-selector{background:#fff;border-bottom:1px solid #dde1ea;padding:12px 32px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.week-selector .wlabel{font-size:12px;color:#888;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-right:4px}
.wbtn{padding:6px 16px;border-radius:20px;cursor:pointer;font-size:13px;font-weight:600;border:1.5px solid #dde1ea;background:#fff;color:#555;transition:all .15s}
.wbtn:hover:not(.active){border-color:#2563eb;color:#2563eb}
.wbtn.active{background:#2563eb;border-color:#2563eb;color:#fff}
.latest-badge{font-size:10px;background:#dcfce7;color:#16a34a;border-radius:10px;padding:1px 6px;margin-left:4px;font-weight:700;vertical-align:middle}
.main{padding:24px 32px;max-width:1600px}
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-bottom:24px}
.kpi{background:#fff;border:1px solid #dde1ea;border-radius:14px;padding:18px 20px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.kpi .klabel{font-size:11px;color:#888;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;font-weight:600}
.kpi .kvalue{font-size:24px;font-weight:800;color:#1a1a2e}
.kpi .kchg{font-size:12px;margin-top:5px;font-weight:600}
.up{color:#2563eb}.down{color:#dc2626}.neu{color:#aaa}
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
.card{background:#fff;border:1px solid #dde1ea;border-radius:14px;padding:24px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.card h3{font-size:12px;color:#888;letter-spacing:1px;text-transform:uppercase;margin-bottom:16px;font-weight:700}
.card canvas{max-height:260px}
.section-block{margin-bottom:16px;overflow-x:auto}
.section-header{color:#444;font-size:12px;font-weight:700;padding:8px 14px;border-radius:8px 8px 0 0;letter-spacing:.5px;background:#eef0f5;border-left:4px solid #9ca3af}
.bg-store{border-left-color:#4b6bfb}.bg-ec{border-left-color:#8b5cf6}.bg-total{border-left-color:#374151}
.bg-inv-store{border-left-color:#6b7280}.bg-inv-ec{border-left-color:#9ca3af}.bg-inv-total{border-left-color:#374151}
.section-table{width:100%;border-collapse:collapse;font-size:11.5px;border:1px solid #dde1ea;border-top:none}
.section-table th{text-align:right;padding:6px 8px;background:#f7f9fc;color:#666;font-weight:700;border-bottom:1px solid #e8eaf0;white-space:nowrap;font-size:11px}
.section-table th:first-child{text-align:left;min-width:110px;position:sticky;left:0;background:#f7f9fc}
.section-table td{text-align:right;padding:6px 8px;border-bottom:1px solid #f0f2f7;white-space:nowrap}
.section-table td:first-child{text-align:left;color:#444;font-weight:600;background:#fafafa;position:sticky;left:0}
.section-table tr:last-child td{border-bottom:none}
.section-table tr:hover td{background:#f7f9fc}
.section-table tr:hover td:first-child{background:#f0f2f7}
.total-col{font-weight:700!important;background:#f7f9fc!important;border-left:1px solid #dde1ea}
.yoy-good{color:#2563eb;font-weight:700}.yoy-bad{color:#dc2626;font-weight:700}.yoy-neu{color:#888}
/* 在庫セクション */
.inv-section{margin-bottom:32px}
.inv-section-title{font-size:18px;font-weight:800;color:#1a1a2e;margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid #2563eb;display:flex;align-items:center;gap:10px}
.inv-section-title .badge-inv{background:#2563eb;color:#fff;font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600}
.inv-kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:20px}
.inv-kpi{border-radius:14px;padding:18px 20px;background:#fff;border:1px solid #dde1ea;box-shadow:0 1px 4px rgba(0,0,0,.05);border-top:3px solid #9ca3af}
.inv-kpi .iklabel{font-size:11px;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;font-weight:600;color:#888}
.inv-kpi .ikvalue{font-size:22px;font-weight:800;color:#1a1a2e}
.inv-kpi .iksub{font-size:11px;margin-top:4px;color:#aaa}
.bg-kikou{border-top-color:#4b6bfb}
.bg-teiban{border-top-color:#8b5cf6}
.bg-carry{border-top-color:#6b7280}
.bg-inactive{border-top-color:#9ca3af}
.bg-total-inv{border-top-color:#374151}
.inv-cat-table{width:100%;border-collapse:collapse;font-size:12px}
.inv-cat-table th{padding:8px 10px;text-align:right;background:#f7f9fc;color:#666;font-weight:700;border-bottom:2px solid #e8eaf0;font-size:11px;white-space:nowrap}
.inv-cat-table th:first-child{text-align:left;min-width:100px}
.inv-cat-table td{padding:7px 10px;text-align:right;border-bottom:1px solid #f0f2f7;white-space:nowrap}
.inv-cat-table td:first-child{text-align:left;font-weight:700;color:#444}
.inv-cat-table tr:hover td{background:#f7f9fc}
.inv-cat-table .kubun-kikou td:first-child{color:#4b6bfb}.inv-cat-table .kubun-teiban td:first-child{color:#8b5cf6}
.inv-cat-table .kubun-carry td:first-child{color:#6b7280}.inv-cat-table .kubun-inactive td:first-child{color:#9ca3af}
.inv-cat-table .total-row td{font-weight:800;background:#f7f9fc;border-top:2px solid #dde1ea}
.inv-cat-table .total-col{font-weight:700!important;background:#f7f9fc!important;border-left:1px solid #dde1ea}
.month-section-title{font-size:18px;font-weight:800;color:#1a1a2e;margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid #059669;display:flex;align-items:center;gap:10px}
.badge-monthly{background:#059669;color:#fff;font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600}
.month-selector{background:#fff;border-bottom:1px solid #dde1ea;padding:10px 0 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:20px}
</style>
</head>
<body>
<header>
  <h1>LYFT</h1>
  <span class="badge">WEEKLY</span>
  <span style="color:#666;font-size:13px">週次売上ダッシュボード</span>
  <span class="updated">最終更新: 2026-05-11 12:15</span>
</header>
<div class="gender-bar">
  <div class="gtab active" onclick="setGender('Total')">Total</div>
  <div class="gtab" onclick="setGender('M')">Mens</div>
  <div class="gtab" onclick="setGender('W')">Womens</div>
</div>
<div class="week-selector">
  <span class="wlabel">週</span>
  <div id="weekBtns" style="display:flex;gap:8px;flex-wrap:wrap"></div>
</div>
<div class="main">
  <div class="kpi-row">
    <div class="kpi"><div class="klabel">店舗売上 2026</div><div class="kvalue" id="k-st26">—</div><div class="kchg" id="k-st-chg"></div></div>
    <div class="kpi"><div class="klabel">EC売上 2026</div><div class="kvalue" id="k-ec26">—</div><div class="kchg" id="k-ec-chg"></div></div>
    <div class="kpi"><div class="klabel">合算売上 2026</div><div class="kvalue" id="k-tot26">—</div><div class="kchg" id="k-tot-chg"></div></div>
    <div class="kpi"><div class="klabel">合算売上 前年比</div><div class="kvalue" id="k-yoy">—</div><div class="kchg neu" id="k-period"></div></div>
    <div class="kpi"><div class="klabel">合算在庫高</div><div class="kvalue" id="k-inv">—</div><div class="kchg neu">最新スナップ</div></div>
  </div>
  <div class="chart-grid">
    <div class="card"><h3>週次売上トレンド（全週）</h3><canvas id="trendChart"></canvas></div>
    <div class="card"><h3>カテゴリ別売上構成（2026実績）</h3><canvas id="donutChart"></canvas></div>
  </div>
  <div id="sectionBlocks"></div>
</div>
<div class="main" style="border-top:3px solid #2563eb;padding-top:28px;margin-top:8px">
  <div class="inv-section-title">エニロジ在庫管理サマリー <span class="badge-inv">INVENTORY</span></div>
  <div class="inv-kpi-row" id="invKpiRow"></div>
  <div class="chart-grid">
    <div class="card"><h3>週次在庫推移</h3><canvas id="invTrendChart"></canvas></div>
    <div class="card" style="overflow-x:auto"><h3 id="invCatTitle">中分類別在庫（最新週）</h3><div id="invCatTable"></div></div>
  </div>
</div>
<div class="main" style="border-top:3px solid #059669;padding-top:28px;margin-top:8px">
  <div class="month-section-title">月間実績 <span class="badge-monthly">MONTHLY</span></div>
  <div class="month-selector">
    <span class="wlabel">月</span>
    <div id="monthBtns" style="display:flex;gap:8px;flex-wrap:wrap"></div>
  </div>
  <div class="kpi-row">
    <div class="kpi"><div class="klabel">店舗売上</div><div class="kvalue" id="mk-st">—</div><div class="kchg" id="mk-st-yoy"></div></div>
    <div class="kpi"><div class="klabel">EC売上</div><div class="kvalue" id="mk-ec">—</div><div class="kchg" id="mk-ec-yoy"></div></div>
    <div class="kpi"><div class="klabel">合算売上</div><div class="kvalue" id="mk-tot">—</div><div class="kchg" id="mk-tot-yoy"></div></div>
    <div class="kpi"><div class="klabel">合算売上 前年比</div><div class="kvalue" id="mk-yoy">—</div><div class="kchg neu" id="mk-label">—</div></div>
    <div class="kpi"><div class="klabel">合算 前年同月実績</div><div class="kvalue" id="mk-prev">—</div><div class="kchg neu">前年同月</div></div>
  </div>
  <div class="chart-grid">
    <div class="card" style="grid-column:1/-1"><h3>月次売上トレンド（全月）</h3><canvas id="mTrendChart" style="max-height:300px"></canvas></div>
  </div>
  <div id="monthSectionBlocks"></div>
</div>

    data:{labels:WEEKS.map(w=>w+'\n'+ALL[w].period),datasets:[
      {label:'店舗',data:WEEKS.map(w=>ALL[w].data[cg].store.cur._total),backgroundColor:WEEKS.map(w=>w===cw?'#2563eb':'#bfdbfe'),borderRadius:5},
      {label:'EC',  data:WEEKS.map(w=>ALL[w].data[cg].ec.cur._total),  backgroundColor:WEEKS.map(w=>w===cw?'#7c3aed':'#ddd6fe'),borderRadius:5}
    ]},
    options:{responsive:true,plugins:{legend:{labels:{color:'#444'}}},
      scales:{x:{stacked:true,ticks:{color:'#555'},grid:{color:'#e8eaf0'}},
               y:{stacked:true,ticks:{color:'#555',callback:v=>'¥'+fmtM(v)},grid:{color:'#e8eaf0'}}}}
  });

  const aT=TAGS.filter(t=>(wd.total.cur[t]||0)>0);
  const pal=['#2563eb','#7c3aed','#059669','#d97706','#dc2626','#0891b2','#db2777','#65a30d','#16a34a','#9333ea','#ca8a04','#0e7490','#7e22ce','#15803d'];
  if(dChart)dChart.destroy();
  dChart=new Chart(document.getElementById('donutChart'),{
    type:'doughnut',
    data:{labels:aT.map(t=>TLABELS[t]),datasets:[{data:aT.map(t=>wd.total.cur[t]||0),backgroundColor:pal,borderWidth:2,borderColor:'#fff'}]},
    options:{responsive:true,plugins:{legend:{position:'right',labels:{color:'#333',font:{size:11},padding:8,boxWidth:12}},
      tooltip:{callbacks:{label:ctx=>` ${ctx.label}: ¥${ctx.raw.toLocaleString()}`}}}}
  });

  const container=document.getElementById('sectionBlocks');
  container.innerHTML='';

  function makeTable(sec, colKeys, colLabels, colSubLabels){
    const sd=wd[sec.key];
    const wrap=document.createElement('div'); wrap.className='section-block';
    const hdr=document.createElement('div');
    hdr.className=`section-header ${BG_CLS[sec.key]||BG_CLS[sec.key.replace('grp_','')]}`;
    hdr.textContent=sec.label;
    wrap.appendChild(hdr);
    const tbl=document.createElement('table'); tbl.className='section-table';
    const tr0=tbl.createTHead().insertRow();
    const th0=document.createElement('th'); th0.textContent='指標'; tr0.appendChild(th0);
    colKeys.forEach((k,i)=>{
      const th=document.createElement('th');
      th.innerHTML=colSubLabels?`${colLabels[i]}<br><span style="color:#bbb;font-weight:400">${colSubLabels[i]}</span>`:colLabels[i];
      tr0.appendChild(th);
    });
    const thT=document.createElement('th'); thT.textContent='合計'; thT.className='total-col'; tr0.appendChild(thT);
    const tb=tbl.createTBody();
    METS.forEach((ml,mi)=>{
      const tr=tb.insertRow();
      const td0=tr.insertCell(); td0.textContent=ml;
      colKeys.forEach(k=>{
        const td=tr.insertCell();
        td.textContent=fmtCell(sd[MET_KEYS[mi]][k],mi);
        td.className=yoyCls(sd[MET_KEYS[mi]][k],mi);
      });
      const tdt=tr.insertCell();
      tdt.textContent=fmtCell(sd[MET_KEYS[mi]]._total,mi);
      tdt.className='total-col '+yoyCls(sd[MET_KEYS[mi]]._total,mi);
    });
    wrap.appendChild(tbl);
    return wrap;
  }

  // 中分類セクション（店舗売上の上）
  GRP_SECS.forEach(sec=>{
    container.appendChild(makeTable(sec, GRP_KEYS, GRP_KEYS, null));
  });

  // 中分類セクション
  SECS.forEach(sec=>{
    container.appendChild(makeTable(sec, TAGS, TAGS, TAGS.map(t=>TLABELS[t])));
  });
}

function setWeek(wk){cw=wk;document.querySelectorAll('.wbtn').forEach(b=>b.classList.toggle('active',b.dataset.wk===wk));renderAll();}
function setGender(g){cg=g;document.querySelectorAll('.gtab').forEach(b=>b.classList.toggle('active',b.textContent.includes(g==='Total'?'Total':g==='M'?'Mens':'Womens')));renderAll();renderMonth();}

const MKEYS = Object.keys(MONTHS_ALL);
let cm = MKEYS[MKEYS.length-1];
let mChart;
const MONTH_SECS = [
  {key:'grp_store',label:'中分類 ×店舗売上'},
  {key:'grp_ec',label:'中分類 ×EC売上'},
  {key:'grp_total',label:'中分類 ×合算売上'},
  {key:'store',label:'店舗売上'},
  {key:'ec',label:'EC売上'},
  {key:'total',label:'合算売上'},
];

function renderMonth(){
  if(!MKEYS.length)return;
  const md=MONTHS_ALL[cm].data[cg];
  const st=md.store.cur._total, ec=md.ec.cur._total, tot=md.total.cur._total;
  const st25=md.store.prev._total, ec25=md.ec.prev._total, tot25=md.total.prev._total;
  const yoy=tot25>0?Math.round(tot/tot25*100):null;
  const yoyStr=(cur,prev)=>prev>0?`前年比 ${Math.round(cur/prev*100)}%`:'前年データなし';
  const yoyCl=(cur,prev)=>prev>0?(cur>=prev?'up':'down'):'neu';
  document.getElementById('mk-st').textContent='¥'+fmtM(st);
  document.getElementById('mk-ec').textContent='¥'+fmtM(ec);
  document.getElementById('mk-tot').textContent='¥'+fmtM(tot);
  document.getElementById('mk-prev').textContent='¥'+fmtM(tot25);
  document.getElementById('mk-label').textContent=MONTHS_ALL[cm].label;
  document.getElementById('mk-st-yoy').innerHTML=`<span class="${yoyCl(st,st25)}">${yoyStr(st,st25)}</span>`;
  document.getElementById('mk-ec-yoy').innerHTML=`<span class="${yoyCl(ec,ec25)}">${yoyStr(ec,ec25)}</span>`;
  document.getElementById('mk-tot-yoy').innerHTML=`<span class="${yoyCl(tot,tot25)}">${yoyStr(tot,tot25)}</span>`;
  const yoyEl=document.getElementById('mk-yoy');
  yoyEl.textContent=yoy!==null?yoy+'%':'—';
  yoyEl.className='kvalue '+(yoy===null?'neu':yoy>=100?'up':'down');

  if(mChart)mChart.destroy();
  mChart=new Chart(document.getElementById('mTrendChart'),{
    type:'bar',
    data:{labels:MKEYS.map(k=>MONTHS_ALL[k].label),datasets:[
      {label:'店舗',data:MKEYS.map(k=>MONTHS_ALL[k].data[cg].store.cur._total),backgroundColor:MKEYS.map(k=>k===cm?'#2563eb':'#bfdbfe'),borderRadius:4},
      {label:'EC',  data:MKEYS.map(k=>MONTHS_ALL[k].data[cg].ec.cur._total),  backgroundColor:MKEYS.map(k=>k===cm?'#7c3aed':'#ddd6fe'),borderRadius:4},
    ]},
    options:{responsive:true,plugins:{legend:{labels:{color:'#444'}}},
      scales:{x:{stacked:true,ticks:{color:'#555'},grid:{color:'#e8eaf0'}},
               y:{stacked:true,ticks:{color:'#555',callback:v=>'¥'+fmtM(v)},grid:{color:'#e8eaf0'}}}}
  });

  const container=document.getElementById('monthSectionBlocks');
  container.innerHTML='';
  MONTH_SECS.forEach(sec=>{
    const isGrp=sec.key.startsWith('grp_');
    const colKeys=isGrp?GRP_KEYS:TAGS;
    const colLabels=colKeys;
    const colSub=isGrp?null:colKeys.map(t=>TLABELS[t]);
    const bgKey=sec.key.replace('grp_','');
    const sd=md[sec.key];
    const wrap=document.createElement('div'); wrap.className='section-block';
    const hdr=document.createElement('div');
    hdr.className=`section-header ${BG_CLS[bgKey]||'bg-total'}`;
    hdr.textContent=sec.label; wrap.appendChild(hdr);
    const tbl=document.createElement('table'); tbl.className='section-table';
    const tr0=tbl.createTHead().insertRow();
    const th0=document.createElement('th'); th0.textContent='指標'; tr0.appendChild(th0);
    colKeys.forEach((k,i)=>{
      const th=document.createElement('th');
      th.innerHTML=colSub?`${colLabels[i]}<br><span style="color:#bbb;font-weight:400">${colSub[i]}</span>`:colLabels[i];
      tr0.appendChild(th);
    });
    const thT=document.createElement('th'); thT.textContent='合計'; thT.className='total-col'; tr0.appendChild(thT);
    const tb=tbl.createTBody();
    METS.forEach((ml,mi)=>{
      const tr=tb.insertRow();
      const td0=tr.insertCell(); td0.textContent=ml;
      colKeys.forEach(k=>{
        const td=tr.insertCell();
        td.textContent=fmtCell(sd[MET_KEYS[mi]][k],mi);
        td.className=yoyCls(sd[MET_KEYS[mi]][k],mi);
      });
      const tdt=tr.insertCell();
      tdt.textContent=fmtCell(sd[MET_KEYS[mi]]._total,mi);
      tdt.className='total-col '+yoyCls(sd[MET_KEYS[mi]]._total,mi);
    });
    wrap.appendChild(tbl); container.appendChild(wrap);
  });
}
function setMonth(k){cm=k;document.querySelectorAll('.mbtn').forEach(b=>b.classList.toggle('active',b.dataset.mk===k));renderMonth();}

const KUBUN_LIST  = ['今期品','定番品','稼働キャリー品','非稼働在庫'];
const KUBUN_COLORS= {'今期品':'#2563eb','定番品':'#7c3aed','稼働キャリー品':'#059669','非稼働在庫':'#d97706'};
const KUBUN_CSS   = {'今期品':'kubun-kikou','定番品':'kubun-teiban','稼働キャリー品':'kubun-carry','非稼働在庫':'kubun-inactive'};
let invTChart;

function renderInv(){
  if(!INV_TREND||INV_TREND.length===0)return;
  const latest=INV_TREND[INV_TREND.length-1];
  const kpiRow=document.getElementById('invKpiRow');
  const kubunKeys=['今期品','定番品','稼働キャリー品','非稼働在庫','合計'];
  const cssKeys=['bg-kikou','bg-teiban','bg-carry','bg-inactive','bg-total-inv'];
  kpiRow.innerHTML=kubunKeys.map((k,i)=>`
    <div class="inv-kpi ${cssKeys[i]}">
      <div class="iklabel">${k}</div>
      <div class="ikvalue">¥${fmtM(latest[k]||0)}</div>
      <div class="iksub">${latest.week} ${latest.date}</div>
    </div>`).join('');

  if(invTChart)invTChart.destroy();
  invTChart=new Chart(document.getElementById('invTrendChart'),{
    type:'bar',
    data:{
      labels:INV_TREND.map(r=>r.week+'\n'+r.date),
      datasets:KUBUN_LIST.map(k=>{return{
        label:k,
        data:INV_TREND.map(r=>r[k]||0),
        backgroundColor:KUBUN_COLORS[k]+'cc',
        borderRadius:3
      }})
    },
    options:{responsive:true,plugins:{legend:{labels:{color:'#444'}}},
      scales:{x:{stacked:true,ticks:{color:'#555'},grid:{color:'#e8eaf0'}},
               y:{stacked:true,ticks:{color:'#555',callback:v=>'¥'+fmtM(v)},grid:{color:'#e8eaf0'}}}}
  });

  const latestWeek=INV_TREND[INV_TREND.length-1].week;
  const catData=INV_CAT[latestWeek]||{};
  document.getElementById('invCatTitle').textContent=`中分類別在庫（${latestWeek} ${latest.date}）`;
  const catContainer=document.getElementById('invCatTable');
  let html=`<table class="inv-cat-table"><thead><tr><th>区分</th>${TAGS.map(t=>`<th>${t}<br><span style="color:#bbb;font-size:10px">${TLABELS[t]}</span></th>`).join('')}<th class="total-col">合計</th></tr></thead><tbody>`;
  KUBUN_LIST.forEach(k=>{
    const d=catData[k]||{};
    html+=`<tr class="${KUBUN_CSS[k]}"><td>${k}</td>`;
    TAGS.forEach(t=>{html+=`<td>¥${(d[t]||0).toLocaleString()}</td>`});
    html+=`<td class="total-col">¥${(d._total||0).toLocaleString()}</td></tr>`;
  });
  const totals={};
  TAGS.forEach(t=>{totals[t]=KUBUN_LIST.reduce((s,k)=>s+((catData[k]||{})[t]||0),0)});
  const grand=TAGS.reduce((s,t)=>s+totals[t],0);
  html+=`<tr class="total-row"><td>合計</td>`;
  TAGS.forEach(t=>{html+=`<td class="total-col">¥${totals[t].toLocaleString()}</td>`});
  html+=`<td class="total-col">¥${grand.toLocaleString()}</td></tr>`;
  html+='</tbody></table>';
  catContainer.innerHTML=html;
}

const bc=document.getElementById('weekBtns');
WEEKS.forEach((wk,i)=>{
  const btn=document.createElement('div');
  btn.className='wbtn'+(wk===cw?' active':'');
  btn.dataset.wk=wk;
  btn.innerHTML=wk+(i===WEEKS.length-1?'<span class="latest-badge">最新</span>':'');
  btn.onclick=()=>setWeek(wk);
  bc.appendChild(btn);
});

const mbc=document.getElementById('monthBtns');
MKEYS.forEach((mk,i)=>{
  const btn=document.createElement('div');
  btn.className='wbtn mbtn'+(mk===cm?' active':'');
  btn.dataset.mk=mk;
  btn.innerHTML=MONTHS_ALL[mk].label+(i===MKEYS.length-1?'<span class="latest-badge">最新</span>':'');
  btn.onclick=()=>setMonth(mk);
  mbc.appendChild(btn);
});

renderAll();
renderInv();
renderMonth();
</script>
</body>
